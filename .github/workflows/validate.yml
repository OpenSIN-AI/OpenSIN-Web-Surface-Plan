name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun --version
      - run: node scripts/validate-registry.mjs
      - run: node scripts/generate-docs.mjs
      - run: git diff --exit-code
